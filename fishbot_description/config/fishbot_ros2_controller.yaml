controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    fishbot_diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

fishbot_diff_drive_controller:
  ros__parameters:
    use_sim_time: true

    left_wheel_names:
      - left_wheel_joint
    right_wheel_names:
      - right_wheel_joint

    wheel_separation: 0.20
    wheel_radius: 0.032

    position_feedback: true
    open_loop: false

    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    publish_rate: 50.0
